<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UR Token DApp</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>
<style>
:root{--bg:#080c16;--card:rgba(16,20,40,0.85);--card2:rgba(20,26,44,0.9);--border:rgba(255,255,255,0.06);--accent:#7c3aed;--accent2:#a78bfa;--green:#10b981;--red:#ef4444;--gold:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--radius:14px;--glow:0 0 30px rgba(124,58,237,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Noto Sans SC','Noto Sans JP','Noto Sans KR',system-ui,sans-serif;background:#080c16;color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 25% 15%,rgba(124,58,237,0.12),transparent 55%),radial-gradient(ellipse at 72% 55%,rgba(245,158,11,0.06),transparent 50%),radial-gradient(ellipse at 45% 80%,rgba(99,102,241,0.08),transparent 50%);z-index:0;animation:bgPulse 8s ease-in-out infinite alternate}
@keyframes bgPulse{0%{opacity:0.8;transform:scale(1)}100%{opacity:1;transform:scale(1.03)}}
body::after{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='g' width='60' height='60' patternUnits='userSpaceOnUse'%3E%3Ccircle cx='30' cy='30' r='0.5' fill='rgba(255,255,255,0.04)'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23g)'/%3E%3C/svg%3E");z-index:0;pointer-events:none}
.container{max-width:1100px;margin:0 auto;padding:20px;position:relative;z-index:1}
header{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:24px;flex-wrap:wrap;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;border-radius:12px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;box-shadow:0 0 16px rgba(124,58,237,0.3);border:2px solid rgba(124,58,237,0.3)}
.logo-text{font-size:21px;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:11px;color:var(--text2);letter-spacing:0.5px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.wallet-section{display:flex;align-items:center;gap:8px}
.lang-switch{display:flex;gap:3px;background:rgba(255,255,255,0.04);border-radius:10px;padding:3px;border:1px solid var(--border)}
.lang-btn{min-width:36px;height:30px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;border-radius:7px;transition:all .25s cubic-bezier(0.4,0,0.2,1);display:flex;align-items:center;justify-content:center;padding:0 6px;position:relative}
.lang-btn.active{background:linear-gradient(135deg,var(--accent),#6d28d9);color:#fff;box-shadow:0 2px 10px rgba(124,58,237,0.4)}
.lang-btn:hover:not(.active){color:var(--text);background:rgba(124,58,237,0.12)}
.btn{padding:10px 22px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;border-radius:inherit;opacity:0;transition:opacity .25s}
.btn-primary{background:linear-gradient(135deg,var(--accent),#6d28d9);color:#fff;box-shadow:0 2px 12px rgba(124,58,237,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,58,237,0.45)}
.btn-primary:active{transform:translateY(0)}
.btn-outline{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);color:var(--text);backdrop-filter:blur(10px)}
.btn-outline:hover{border-color:var(--accent2);color:#fff;background:rgba(124,58,237,0.1);box-shadow:0 0 16px rgba(124,58,237,0.15)}
.btn-sm{padding:7px 16px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.address-pill{background:var(--card2);border:1px solid var(--border);padding:8px 14px;border-radius:10px;font-family:monospace;font-size:13px;color:var(--accent2);cursor:pointer;transition:all .25s;backdrop-filter:blur(10px)}
.address-pill:hover{border-color:var(--accent);box-shadow:0 0 12px rgba(124,58,237,0.2)}
.network-badge{font-size:12px;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:22px;transition:all .35s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.3),transparent);opacity:0;transition:opacity .35s}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.4),var(--glow);border-color:rgba(124,58,237,0.2)}
.stat-card:hover::before{opacity:1}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.stat-value{font-size:30px;font-weight:700;transition:color .3s}
.stat-value.green{color:var(--green)}.stat-value.gold{color:var(--gold)}.stat-value.accent{color:var(--accent2)}
.tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:5px;flex-wrap:wrap;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.tab{padding:10px 20px;border-radius:10px;border:none;background:transparent;color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;transition:all .3s cubic-bezier(0.4,0,0.2,1);position:relative}
.tab.active{background:linear-gradient(135deg,var(--accent),#6d28d9);color:#fff;box-shadow:0 2px 12px rgba(124,58,237,0.35)}
.tab:hover:not(.active){color:var(--text);background:rgba(124,58,237,0.08)}
.panel{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:24px;display:none;animation:fadeIn .35s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.2);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:all .3s;backdrop-filter:blur(10px)}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(124,58,237,0.12),0 0 20px rgba(124,58,237,0.08)}
.form-input::placeholder{color:#4a5568}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;margin-top:8px}
.tax-preview{background:rgba(0,0,0,0.2);border-radius:10px;padding:14px;margin-top:8px;font-size:13px;border:1px solid rgba(255,255,255,0.04)}
.tax-row{display:flex;justify-content:space-between;padding:4px 0;color:var(--text2)}
.tax-row.total{border-top:1px solid rgba(255,255,255,0.06);margin-top:4px;padding-top:8px;color:var(--text);font-weight:600}
.info-box{background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px;margin-bottom:12px;transition:all .3s;backdrop-filter:blur(10px)}
.info-box:hover{border-color:rgba(124,58,237,0.2);box-shadow:0 0 16px rgba(124,58,237,0.08)}
.info-key{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.info-val{font-size:16px;font-weight:600;margin-top:4px;word-break:break-all}
.info-val.mono{font-family:monospace;font-size:14px}
.toast{position:fixed;top:24px;right:24px;z-index:999;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:500;animation:toastIn .4s cubic-bezier(0.16,1,0.3,1);display:none;max-width:420px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.toast.success{background:rgba(6,95,70,0.9);color:#6ee7b7;border:1px solid rgba(5,150,105,0.4)}
.toast.error{background:rgba(127,29,29,0.9);color:#fca5a5;border:1px solid rgba(220,38,38,0.4)}
.toast.info{background:rgba(30,58,95,0.9);color:#93c5fd;border:1px solid rgba(37,99,235,0.4)}
@keyframes toastIn{from{transform:translateX(120%) scale(0.9);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
iframe{border-radius:10px;border:1px solid rgba(255,255,255,0.06)}
@media(max-width:640px){.form-row{grid-template-columns:1fr}.stat-value{font-size:22px}.header-right{width:100%}}
</style>
</head>

let currentLang = "zh";
function t(key) { return I18N[currentLang]?.[key] || I18N.en[key] || key; }
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.dataset.i18n;
    if (k) el.textContent = t(k);
    const pk = el.dataset.i18nPlaceholder;
    if (pk) el.placeholder = t(pk);
  });
  const netBadge = document.getElementById("networkBadge");
  if (netBadge) netBadge.textContent = account ? t("bscMainnet") : t("notConnected");
  if (account) document.getElementById("btnConnect").textContent = t("connected");
  updateNodeText();
  if (document.getElementById("taxPreview").style.display !== "none") previewTax();
}
document.getElementById("langSwitch").addEventListener("click", e => {
  const btn = e.target.closest(".lang-btn");
  if (btn) setLang(btn.dataset.lang);
});

// ==================== Contract ====================
const CONTRACT_ADDR = "0x22085a4998700C3b211b9Fc0a5fA4418c1766f87";
const BSC_RPC = "https://bsc-dataseed.binance.org";
const BSC_ID = 56;
let provider, signer, contract, account;

async function init() {
  try { provider = new ethers.JsonRpcProvider(BSC_RPC); } catch(e) {}
  contract = new ethers.Contract(CONTRACT_ADDR, ABI, provider);
  await loadInfo();
}

async function connect() {
  if (!window.ethereum) return toast(t("t_walletRequired"), "error");
  try {
    const p = new ethers.BrowserProvider(window.ethereum);
    await p.send("eth_requestAccounts", []);
    signer = await p.getSigner();
    account = await signer.getAddress();
    const net = await p.getNetwork();
    if (Number(net.chainId) !== BSC_ID) {
      try { await window.ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:"0x38"}]}); }
      catch(e) { return toast(t("t_switch"), "error"); }
    }
    contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);
    document.getElementById("btnConnect").textContent = t("connected");
    document.getElementById("btnConnect").disabled = true;
    document.getElementById("walletAddr").style.display = "block";
    document.getElementById("walletAddr").textContent = account.slice(0,6)+"..."+account.slice(-4);
    document.getElementById("networkBadge").textContent = t("bscMainnet");
    document.getElementById("networkBadge").style.color = "var(--green)";
    await refreshAll();
    if (account.toLowerCase() === (await contract.owner()).toLowerCase()) {
      document.getElementById("tabAdmin").style.display = "block";
    }
  } catch(e) { toast(t("t_connFail") + e.message, "error"); }
}

async function refreshAll() { await Promise.all([loadBalances(), loadReferral(), loadInfo()]); }

async function loadInfo() {
  try {
    const ts = await contract.totalSupply();
    document.getElementById("totalSupply").textContent = Number(ethers.formatEther(ts)).toLocaleString() + " UR";
    
    document.getElementById("nextBurn").textContent = new Date(Number(await contract.getNextDailyBurnTime())*1000).toLocaleString();
  } catch(e) {}
}

async function loadBalances() {
  if (!account) return;
  try {
    const bal = await contract.balanceOf(account);
    document.getElementById("myBalance").textContent = Number(ethers.formatEther(bal)).toLocaleString() + " UR";
    updateNodeText();
  } catch(e) {}
}

async function updateNodeText() {
  if (!account) return;
  try {
    const isN = await contract.isNode(account);
    document.getElementById("nodeStatus").textContent = isN ? t("nodeActive") : t("nodeInactive");
    document.getElementById("nodeStatus").className = "stat-value " + (isN ? "gold" : "");
  } catch(e) {}
}

async function loadReferral() {
  if (!account) return;
  try {
    const ref = await contract.referrer(account);
    document.getElementById("myReferrer").textContent = ref === ethers.ZeroAddress ? t("noUpline") : ref;
    document.getElementById("referralDepth").textContent = (await contract.getReferralDepth(account)).toString() + " " + t("layers");
    document.getElementById("referralsCount").textContent = (await contract.getReferralsCount(account)).toString() + " " + t("people");
  } catch(e) {}
}

function previewTax() {
  const amt = document.getElementById("txAmount").value;
  const box = document.getElementById("taxPreview");
  if (!amt || amt <= 0) { box.style.display = "none"; return; }
  const tax = amt * 0.1, nd = tax * 0.3, mk = tax * 0.2, kp = tax * 0.5;
  box.style.display = "block";
  box.innerHTML = `<div class="tax-row"><span>${t("txLabel")}</span><span>${amt} UR</span></div>
<div class="tax-row"><span>${t("txTax")}</span><span style="color:var(--red)">-${tax.toFixed(4)} UR</span></div>
<div class="tax-row"><span>&nbsp;&nbsp;${t("txNode")}</span><span>${nd.toFixed(4)} UR</span></div>
<div class="tax-row"><span>&nbsp;&nbsp;${t("txMkt")}</span><span>${mk.toFixed(4)} UR</span></div>
<div class="tax-row"><span>&nbsp;&nbsp;${t("txKeep")}</span><span>${kp.toFixed(4)} UR</span></div>
<div class="tax-row total"><span>${t("txReceive")}</span><span style="color:var(--green)">${(amt-tax).toFixed(4)} UR</span></div>`;
}

async function doTransfer() {
  if (!signer) return toast(t("t_walletRequired"), "error");
  const to = document.getElementById("txTo").value.trim();
  const amt = document.getElementById("txAmount").value;
  if (!ethers.isAddress(to)) return toast(t("t_invAddr"), "error");
  if (!amt || Number(amt) <= 0) return toast(t("t_invAmt"), "error");
  try {
    const tx = await contract.transfer(to, ethers.parseEther(amt));
    toast(t("t_txSent") + tx.hash.slice(0,10) + "...", "info");
    await tx.wait(); toast(t("t_ok"), "success"); await refreshAll();
  } catch(e) { toast(t("t_fail") + (e.reason||e.message), "error"); }
}

async function doBindReferrer() {
  if (!signer) return toast(t("t_walletRequired"), "error");
  const addr = document.getElementById("bindReferrer").value.trim();
  if (!ethers.isAddress(addr)) return toast(t("t_invAddr"), "error");
  try {
    const tx = await contract.bindReferrer(addr);
    toast(t("t_txSent") + tx.hash.slice(0,10) + "...", "info");
    await tx.wait(); toast(t("t_bindOk"), "success"); await loadReferral();
  } catch(e) { toast(t("t_fail") + (e.reason||e.message), "error"); }
}

async function doEnableTrading() {
  try {
    const tx = await contract.enableTrading();
    toast(t("t_txSent") + tx.hash.slice(0,10) + "...", "info");
    await tx.wait(); toast(t("t_tradingOn"), "success");
  } catch(e) { toast(t("t_fail") + (e.reason||e.message), "error"); }
}

async function doMint() {
  const to = document.getElementById("mintTo").value.trim();
  const amt = document.getElementById("mintAmount").value;
  if (!ethers.isAddress(to)) return toast(t("t_invAddr"), "error");
  try {
    const tx = await contract.mint(to, ethers.parseEther(amt));
    toast(t("t_txSent") + tx.hash.slice(0,10) + "...", "info");
    await tx.wait(); toast(t("t_mintOk"), "success"); await refreshAll();
  } catch(e) { toast(t("t_fail") + (e.reason||e.message), "error"); }
}

async function doSetThreshold() {
  const v = document.getElementById("newThreshold").value;
  try {
    const tx = await contract.setNodeThreshold(ethers.parseEther(v));
    await tx.wait(); toast(t("t_thresOk"), "success"); await loadInfo();
  } catch(e) { toast(t("t_fail") + (e.reason||e.message), "error"); }
}

async function doSetMarketing() {
  const addr = document.getElementById("newMarketing").value.trim();
  if (!ethers.isAddress(addr)) return toast(t("t_invAddr"), "error");
  try {
    const tx = await contract.setMarketingWallet(addr);
    await tx.wait(); toast(t("t_mktOk"), "success");
  } catch(e) { toast(t("t_fail") + (e.reason||e.message), "error"); }
}

function copyAddr() {
  if (account) { navigator.clipboard.writeText(account); toast(t("t_copied"), "success"); }
}

function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = "toast " + type; el.style.display = "block";
  setTimeout(() => el.style.display = "none", 3500);
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.panel).classList.add("active");
  });
});

setLang("zh");
init();

// URL param detection for referral
(function(){
  var p = new URLSearchParams(window.location.search);
  var ref = p.get("ref");
  if (ref && ethers.isAddress(ref)) {
    document.getElementById("bindReferrer").value = ref;
    // Switch to referral tab
    setTimeout(function(){
      document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
      document.querySelectorAll(".panel").forEach(function(p){ p.classList.remove("active"); });
      var refTab = document.querySelector(".tab[data-panel='referral']");
      if (refTab) { refTab.classList.add("active"); document.getElementById("referral").classList.add("active"); }
    }, 1000);
  }
})();

function generateRefLink() {
  if (!account) return toast(t("t_walletRequired"), "error");
  var link = window.location.href.split("?")[0] + "?ref=" + account;
  document.getElementById("refLinkInput").value = link;
}

function copyRefLink() {
  if (!account) return toast(t("t_walletRequired"), "error");
  generateRefLink();
  var inp = document.getElementById("refLinkInput");
  inp.select();
  document.execCommand("copy");
  toast(t("t_copied"), "success");
}

</script>

<script>
document.getElementById("pcsFrame").addEventListener("error", function(){
  this.style.display = "none";
  document.getElementById("pcsFallback").style.display = "block";
});
setTimeout(function(){
  var f = document.getElementById("pcsFrame");
  if (f && (f.contentDocument || f.contentWindow)) {
    try { var d = f.contentDocument || f.contentWindow.document; if (!d || !d.body) throw 1; } catch(e) {
      f.style.display = "none";
      document.getElementById("pcsFallback").style.display = "block";
    }
  }
}, 4000);
</script>
